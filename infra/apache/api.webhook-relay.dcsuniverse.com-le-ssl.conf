<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName api.webhook-relay.dcsuniverse.com
    DocumentRoot /var/www/webhook-relay/current/public

    <Directory /var/www/webhook-relay/current/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/webhook-relay-api-error.log
    CustomLog ${APACHE_LOG_DIR}/webhook-relay-api-access.log combined

SSLCertificateFile /etc/letsencrypt/live/webhook-relay.dcsuniverse.com/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/webhook-relay.dcsuniverse.com/privkey.pem
Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
