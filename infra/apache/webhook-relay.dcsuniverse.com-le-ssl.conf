<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName webhook-relay.dcsuniverse.com
    DocumentRoot /var/www/webhook-relay-web/public

    <Directory /var/www/webhook-relay-web/public>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/webhook-relay-web-error.log
    CustomLog ${APACHE_LOG_DIR}/webhook-relay-web-access.log combined

SSLCertificateFile /etc/letsencrypt/live/webhook-relay.dcsuniverse.com/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/webhook-relay.dcsuniverse.com/privkey.pem
Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
