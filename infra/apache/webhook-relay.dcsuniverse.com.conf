# Canonical reverse-proxy form. The HTTP-only static-serve form was used
# initially so certbot could issue the cert; this is what runs once the
# PM2 Next.js process is online (port 3005, see web/deploy.config.js).

<VirtualHost *:80>
    ServerName webhook-relay.dcsuniverse.com

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3005/
    ProxyPassReverse / http://127.0.0.1:3005/

    # Long timeouts for SSE (Live Echo widget).
    ProxyTimeout 600

    ErrorLog ${APACHE_LOG_DIR}/webhook-relay-web-error.log
    CustomLog ${APACHE_LOG_DIR}/webhook-relay-web-access.log combined

RewriteEngine on
RewriteCond %{SERVER_NAME} =webhook-relay.dcsuniverse.com
RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

# Requires: sudo a2enmod proxy proxy_http
